<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GrapesJS Studio – Sayfa Düzenleyici</title>
    <meta name="description" content="Modern, görsel web sayfası düzenleyici. Blokları sürükle-bırak ile sayfanı oluştur.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/vendor/grapesjs/css/grapes.min.css">
    <link rel="stylesheet" href="/assets/editor.css">
  </head>
  <body>
    <!-- ── Top Navigation Bar ── -->
    <header class="topbar" id="topbar">
      <div class="topbar-left">
        <div class="brand" id="brand">
          <div class="brand-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/>
              <line x1="12" y1="22" x2="12" y2="15.5"/>
              <polyline points="22 8.5 12 15.5 2 8.5"/>
              <polyline points="2 15.5 12 8.5 22 15.5"/>
              <line x1="12" y1="2" x2="12" y2="8.5"/>
            </svg>
          </div>
          <div class="brand-text">
            <strong>GrapesJS Studio</strong>
            <span id="storageBadge" class="storage-badge">Bağlanıyor…</span>
          </div>
        </div>
      </div>

      <div class="topbar-center">
        <div class="page-controls">
          <div class="page-selector-group">
            <i class="fa-regular fa-file"></i>
            <select id="pageSelect" title="Sayfa seçin"></select>
          </div>
          <div class="new-page-group">
            <input id="newPageSlug" type="text" placeholder="yeni-sayfa-adresi" title="Yeni sayfa URL adresi">
            <button id="newPageButton" type="button" class="btn btn-ghost" title="Yeni sayfa oluştur">
              <i class="fa-solid fa-plus"></i>
              <span>Yeni</span>
            </button>
          </div>
        </div>
      </div>

      <div class="topbar-right">
        <div class="action-buttons">
          <button id="undoButton" type="button" class="btn btn-icon" title="Geri al (Ctrl+Z)">
            <i class="fa-solid fa-rotate-left"></i>
          </button>
          <button id="redoButton" type="button" class="btn btn-icon" title="Yinele (Ctrl+Y)">
            <i class="fa-solid fa-rotate-right"></i>
          </button>
          <div class="separator"></div>
          <button id="deletePageButton" type="button" class="btn btn-icon btn-danger" title="Sayfayı sil">
            <i class="fa-regular fa-trash-can"></i>
          </button>
          <button id="saveButton" type="button" class="btn btn-primary" title="Kaydet (Ctrl+S)">
            <i class="fa-regular fa-floppy-disk"></i>
            <span>Kaydet</span>
          </button>
          <a id="previewLink" class="btn btn-accent" target="_blank" rel="noreferrer" title="Sayfayı önizle">
            <i class="fa-regular fa-eye"></i>
            <span>Önizle</span>
          </a>
          <button id="exportButton" type="button" class="btn btn-icon" title="HTML olarak indir">
            <i class="fa-solid fa-file-arrow-down"></i>
          </button>
        </div>
        <p id="status" role="status" class="status-text"></p>
      </div>
    </header>

    <!-- ── Editor Area ── -->
    <main class="editor-frame">
      <div id="gjs"></div>
    </main>

    <!-- ── Scripts ── -->
    <script src="/vendor/grapesjs/grapes.min.js"></script>
    <script src="/vendor/grapesjs-blocks-basic/index.js"></script>
    <script src="/vendor/grapesjs-plugin-forms/index.js"></script>
    <script src="/vendor/grapesjs-tabs/grapesjs-tabs.min.js"></script>
    <script src="/vendor/grapesjs-preset-webpage/index.js"></script>
    <script src="/vendor/grapesjs-component-countdown/index.js"></script>
    <script src="/vendor/grapesjs-tooltip/index.js"></script>
    <script src="/vendor/grapesjs-typed/index.js"></script>
    <script src="/vendor/grapesjs-style-gradient/index.js"></script>
    <script src="/assets/editor.js"></script>
  </body>
</html>
